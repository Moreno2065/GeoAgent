# =============================================================================
# GeoAgent Sandbox 容器编排
# =============================================================================
# 快速启动：
#   docker compose -f docker/docker-compose.yml up -d
#
# 查看日志：
#   docker compose -f docker/docker-compose.yml logs -f
#
# 关闭：
#   docker compose -f docker/docker-compose.yml down
#
# 健康检查：
#   curl http://localhost:8765/health
# =============================================================================

services:
  # ---- 主应用（可选，也可直接在宿主机运行 app.py）----
  # geoagent-app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8501:8501"   # Streamlit UI
  #   environment:
  #     - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
  #   depends_on:
  #     sandbox:
  #       condition: service_healthy
  #   networks:
  #     - geoagent-net
  #   volumes:
  #     - ./workspace:/workspace    # 挂载工作空间（只读代码，数据隔离）

  # ---- 代码执行沙盒容器（物理隔离）----
  sandbox:
    build:
      context: ..
      dockerfile: docker/sandbox.dockerfile
    image: geoagent-sandbox:latest
    container_name: geoagent-sandbox
    hostname: sandbox
    restart: unless-stopped

    # ---- 资源硬限制（防止 OOM 崩溃宿主机）----
    deploy:
      resources:
        limits:
          memory: 512M          # 最多使用 512MB 内存
          cpus: "1.0"          # 最多使用 1 核 CPU
        reservations:
          memory: 128M
          cpus: "0.25"

    # ---- 网络隔离（不暴露到公网，仅内部通信）----
    ports:
      - "127.0.0.1:8765:8765"  # 仅监听 localhost，防止外部访问

    # ---- 文件系统隔离 ----
    volumes:
      - sandbox-workspace:/workspace/outputs    # 容器内 /workspace/outputs 持久化

    # ---- 安全：只读根文件系统（除了白名单路径）----
    read_only: false   # 设为 true 需要配合 tmpfs 和白名单绑定，建议生产环境开启
    tmpfs:
      - /tmp:size=50M,mode=1777

    # ---- 资源清理：禁止 swap ----
    mem_limit: 512m
    memswap_limit: 512m

    networks:
      - geoagent-net

    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8765)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sandbox-workspace:
    driver: local

networks:
  geoagent-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
